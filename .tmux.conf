set -g prefix C-a
unbind C-b
bind C-a send-prefix

set -g mouse on
# Don't fight mouse drag — let it work normally

bind - splitw -v -c '#{pane_current_path}'
bind \\ splitw -h -c '#{pane_current_path}'
setw -g mode-keys vi

# OSC 52 clipboard — lets tmux write to your local clipboard over SSH
set -g set-clipboard on

# Sensible scrollback
set -g history-limit 50000
